<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>からだの記録</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f1ea; --bg-card: #fffdf8; --ink: #3a3530; --ink-soft: #6b6259;
  --accent: #d97757; --accent-soft: #f4d4c5; --line: #e8e2d6;
  --rose: #c97064; --sage: #8a9a7b;
}
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg); color: var(--ink); min-height: 100vh;
  padding: 20px 16px 100px;
  background-image: radial-gradient(circle at 10% 20%, rgba(217,119,87,.05) 0%, transparent 50%), radial-gradient(circle at 90% 80%, rgba(138,154,123,.04) 0%, transparent 50%);
}
.container { max-width: 480px; margin: 0 auto; position: relative; }
header { text-align: center; padding: 24px 0 28px; }
h1 { font-family: 'Klee One', serif; font-size: 26px; font-weight: 600; letter-spacing: .06em; }
.subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }
.sync-status { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--ink-soft); margin-top: 8px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background .4s; }
.sync-dot.ok { background: var(--sage); }
.sync-dot.err { background: var(--rose); }
.sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.tabs { display: flex; background: var(--bg-card); border-radius: 14px; padding: 4px; margin-bottom: 20px; border: 1px solid var(--line); gap: 2px; }
.tab { flex: 1; padding: 10px 4px; border: none; background: transparent; font-family: inherit; font-size: 13px; color: var(--ink-soft); cursor: pointer; border-radius: 10px; transition: all .2s; }
.tab.active { background: var(--accent); color: white; font-weight: 600; }
.card { background: var(--bg-card); border-radius: 18px; padding: 20px; margin-bottom: 14px; border: 1px solid var(--line); }
.section-title { font-family: 'Klee One', serif; font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--ink); }
.member-select { display: flex; flex-wrap: wrap; gap: 8px; }
.member-btn { padding: 10px 18px; border: 2px solid var(--line); border-radius: 20px; background: var(--bg); font-family: inherit; font-size: 14px; color: var(--ink); cursor: pointer; transition: all .15s; font-weight: 500; }
.member-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.cond-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cond-btn { padding: 12px 8px; border: 2px solid var(--line); border-radius: 12px; background: var(--bg); font-family: inherit; font-size: 12px; color: var(--ink); cursor: pointer; text-align: center; transition: all .15s; }
.cond-btn .cb-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
.cond-btn.active { border-color: var(--accent); background: var(--accent-soft); font-weight: 600; }
.appetite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.appetite-grid .appetite-btn:first-child { grid-column: 1 / -1; }
.appetite-btn { padding: 14px 10px; border: 2px solid var(--line); border-radius: 14px; background: var(--bg); font-family: inherit; font-size: 13px; color: var(--ink); cursor: pointer; text-align: center; transition: all .15s; line-height: 1.4; }
.appetite-btn .ap-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
.appetite-btn .ap-label { font-weight: 600; display: block; font-size: 12px; }
.appetite-btn .ap-desc { font-size: 11px; color: var(--ink-soft); }
.appetite-btn.active-choo { border-color: #e64c4c; background: #fff0f0; }
.appetite-btn.active-futsuu { border-color: var(--sage); background: #f2f6ef; }
.appetite-btn.active-biwaru { border-color: var(--accent); background: var(--accent-soft); }
.appetite-btn.active-kyokuwaru { border-color: var(--rose); background: #fdecea; }
.chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { padding: 7px 13px; background: var(--bg); border: 1px solid var(--line); border-radius: 20px; font-family: inherit; font-size: 13px; color: var(--ink); cursor: pointer; transition: all .15s; }
.chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.label { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 500; }
.form-group { margin-bottom: 16px; }
textarea, input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; font-family: inherit; font-size: 14px; background: var(--bg); color: var(--ink); }
textarea { resize: vertical; min-height: 64px; }
textarea:focus, input:focus { outline: none; border-color: var(--accent); }
.save-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent) 0%, var(--rose) 100%); color: white; border: none; border-radius: 14px; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 14px rgba(217,119,87,.25); transition: transform .15s; letter-spacing: .05em; }
.save-btn:active { transform: scale(.97); }
.record-item { padding: 14px; background: var(--bg); border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
.record-head { display: flex; justify-content: space-between; align-items: flex-start; }
.record-time { font-size: 12px; color: var(--ink-soft); }
.record-who { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: var(--accent-soft); color: var(--accent); font-weight: 600; }
.record-cond { font-size: 15px; margin: 6px 0 4px; font-weight: 500; }
.record-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.record-tag { font-size: 11px; padding: 2px 8px; background: var(--accent-soft); color: var(--accent); border-radius: 10px; }
.record-appetite { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-top: 5px; }
.ap-choo { background: #fff0f0; color: #e64c4c; }
.ap-futsuu { background: #f2f6ef; color: var(--sage); }
.ap-biwaru { background: var(--accent-soft); color: var(--accent); }
.ap-kyokuwaru { background: #fdecea; color: var(--rose); }
.record-note { font-size: 13px; color: var(--ink); margin-top: 7px; line-height: 1.5; }
.delete-btn { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 4px; margin-left: 4px; }
.insight { background: linear-gradient(135deg, var(--accent-soft) 0%, #f5e0d2 100%); padding: 16px; border-radius: 14px; margin-bottom: 12px; font-size: 14px; line-height: 1.8; color: var(--ink); }
.insight-title { font-family: 'Klee One', serif; font-weight: 600; margin-bottom: 6px; color: var(--rose); }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--line); }
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--ink-soft); }
.stat-value { font-family: 'Klee One', serif; font-size: 16px; font-weight: 600; color: var(--accent); }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 12px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar { width: 100%; background: linear-gradient(to top, var(--accent), var(--accent-soft)); border-radius: 4px 4px 0 0; min-height: 2px; }
.bar-label { font-size: 10px; color: var(--ink-soft); text-align: center; }
.empty { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 14px; line-height: 1.8; }
.hidden { display: none; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; transition: transform .3s; z-index: 300; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.settings-section-title { font-size: 13px; font-weight: 600; color: var(--ink-soft); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
.member-list-manage { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.member-row-manage { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: 12px; padding: 10px 14px; border: 1px solid var(--line); }
.member-emoji-btn { font-size: 24px; background: none; border: none; cursor: pointer; padding: 0; line-height: 1; border-radius: 8px; transition: transform .1s; }
.member-emoji-btn:active { transform: scale(.85); }
.member-name-text { flex: 1; font-size: 14px; font-weight: 500; }
.member-del-btn { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 2px 6px; }
.member-del-btn:hover { color: var(--rose); }
.add-row { display: flex; gap: 8px; }
.add-row input { flex: 1; margin-bottom: 0; }
.add-btn { padding: 11px 16px; background: var(--accent); color: white; border: none; border-radius: 11px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.emoji-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: flex-end; justify-content: center; background: rgba(0,0,0,.4); }
.emoji-panel { background: var(--bg-card); border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 480px; }
.emoji-panel-title { font-family: 'Klee One', serif; font-size: 15px; margin-bottom: 14px; }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-opt { font-size: 28px; padding: 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; cursor: pointer; transition: transform .1s; }
.emoji-opt:active { transform: scale(.88); }
.sub-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
.sub-tab { padding: 7px 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 20px; font-family: inherit; font-size: 13px; color: var(--ink-soft); cursor: pointer; transition: all .15s; }
.sub-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.modal-note { font-size: 12px; color: var(--ink-soft); line-height: 1.7; margin-top: 6px; }

/* ロック画面 */
#lockScreen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(217,119,87,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(138,154,123,.06) 0%, transparent 50%);
}
.lock-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 36px 28px;
  max-width: 360px;
  width: 100%;
  border: 1px solid var(--line);
  text-align: center;
}
.lock-emoji { font-size: 42px; margin-bottom: 14px; }
.lock-title {
  font-family: 'Klee One', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
}
.lock-subtitle { font-size: 13px; color: var(--ink-soft); margin-bottom: 26px; }
.lock-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--line);
  border-radius: 14px;
  font-family: inherit;
  font-size: 16px;
  background: var(--bg);
  color: var(--ink);
  text-align: center;
  margin-bottom: 12px;
}
.lock-input:focus { outline: none; border-color: var(--accent); }
.lock-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--rose) 100%);
  color: white;
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: .05em;
}
.lock-btn:active { transform: scale(.97); }
.lock-error {
  font-size: 13px;
  color: var(--rose);
  margin-top: 8px;
  height: 18px;
}
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-emoji">🌿</div>
    <div class="lock-title">からだの記録</div>
    <div class="lock-subtitle">あいことばを入れてください</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="あいことば" autofocus
      onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="lock-btn" onclick="checkPassword()">入る</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<div id="emojiOverlay" class="emoji-overlay" style="display:none">
  <div class="emoji-panel">
    <div class="emoji-panel-title">絵文字を選んで</div>
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>
</div>

<div class="container">
  <header>
    <h1>からだの記録</h1>
    <p class="subtitle">ふたりのきろく</p>
    <div class="sync-status">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncLabel">接続中...</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="record">きろく</button>
    <button class="tab" data-tab="history">りれき</button>
    <button class="tab" data-tab="analysis">ぶんせき</button>
    <button class="tab" data-tab="settings">かんり</button>
  </div>

  <div id="tab-record">
    <div class="card">
      <div class="section-title">だれの記録？</div>
      <div class="member-select" id="memberSelect">
        <div style="font-size:13px;color:var(--ink-soft)">「かんり」タブでメンバーを追加してください</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">いまの体調は？</div>
      <div class="cond-row">
        <button class="cond-btn" data-cond="genki" onclick="selectCond(this)"><span class="cb-emoji">☀️</span>元気</button>
        <button class="cond-btn" data-cond="futsuu" onclick="selectCond(this)"><span class="cb-emoji">🌤</span>まあまあ</button>
        <button class="cond-btn" data-cond="warui" onclick="selectCond(this)"><span class="cb-emoji">🌧</span>わるい</button>
        <button class="cond-btn" data-cond="tsurai" onclick="selectCond(this)"><span class="cb-emoji">⛈</span>つらい</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">🍚 食欲メーター</div>
      <div class="appetite-grid">
        <button class="appetite-btn" data-ap="choo" onclick="selectAppetite(this)"><span class="ap-emoji">🍜</span><span class="ap-label">超いい</span><span class="ap-desc">ラーメン求</span></button>
        <button class="appetite-btn" data-ap="futsuu" onclick="selectAppetite(this)"><span class="ap-emoji">🍙</span><span class="ap-label">ふつう</span><span class="ap-desc">普通に米食えそう</span></button>
        <button class="appetite-btn" data-ap="biwaru" onclick="selectAppetite(this)"><span class="ap-emoji">😶</span><span class="ap-label">びわる</span><span class="ap-desc">米ちょい険しいかも</span></button>
        <button class="appetite-btn" data-ap="kyokuwaru" onclick="selectAppetite(this)"><span class="ap-emoji">🛌</span><span class="ap-label">きょくわる</span><span class="ap-desc">米はむりだあ</span></button>
      </div>
    </div>

    <div class="card">
      <div class="form-group">
        <label class="label">症状（複数えらべます）</label>
        <div class="chip-group">
          <button class="chip" data-val="頭痛" onclick="toggleChip(this)">頭痛</button>
          <button class="chip" data-val="腹痛" onclick="toggleChip(this)">腹痛</button>
          <button class="chip" data-val="吐き気" onclick="toggleChip(this)">吐き気</button>
          <button class="chip" data-val="めまい" onclick="toggleChip(this)">めまい</button>
          <button class="chip" data-val="だるい" onclick="toggleChip(this)">だるい</button>
          <button class="chip" data-val="眠気" onclick="toggleChip(this)">眠気</button>
          <button class="chip" data-val="不安" onclick="toggleChip(this)">不安</button>
          <button class="chip" data-val="生理" onclick="toggleChip(this)">生理</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="label">食事タイミング</label>
        <div class="chip-group" id="mealGroup">
          <button class="chip" data-val="食前" onclick="selectSingle(this)">食前</button>
          <button class="chip" data-val="食後" onclick="selectSingle(this)">食後</button>
          <button class="chip" data-val="空腹" onclick="selectSingle(this)">空腹</button>
          <button class="chip" data-val="関係なし" onclick="selectSingle(this)">関係なし</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">📝 メモ</div>
      <textarea id="noteInput" placeholder="今日どんな一日だったか、気になること、なんでも"></textarea>
    </div>

    <button class="save-btn" onclick="saveRecord()">記録する</button>
  </div>

  <div id="tab-history" class="hidden">
    <div class="card">
      <div class="section-title">これまでの記録</div>
      <div class="sub-tabs" id="historyFilter"></div>
      <div id="recordList"><div class="empty">読み込み中...</div></div>
    </div>
  </div>

  <div id="tab-analysis" class="hidden">
    <div id="analysisContent"><div class="card"><div class="empty">読み込み中...</div></div></div>
  </div>

  <div id="tab-settings" class="hidden">
    <div class="card">
      <div class="section-title">👥 メンバー管理</div>
      <div class="settings-section-title">登録済みメンバー</div>
      <div class="member-list-manage" id="memberListManage"></div>
      <div class="add-row">
        <input type="text" id="newMemberName" placeholder="名前を追加（例: たろう）" maxlength="10" onkeydown="if(event.key==='Enter')addMember()">
        <button class="add-btn" onclick="addMember()">追加</button>
      </div>
      <p class="modal-note" style="margin-top:10px">絵文字アイコンをタップして変更できます</p>
    </div>

    <div class="card">
      <div class="section-title">🔥 接続情報</div>
      <div class="stat-row">
        <span class="stat-label">プロジェクト</span>
        <span class="stat-value" style="font-size:12px">condition-kazutan-manager</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">ステータス</span>
        <span class="stat-value" id="settingsSyncText" style="font-size:13px">確認中</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ===== あいことばロック =====
var SECRET_PASSWORD = 'みちくん';

function checkPassword() {
  var input = document.getElementById('lockInput').value.trim();
  var errorEl = document.getElementById('lockError');
  if (input === SECRET_PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
  } else {
    errorEl.textContent = 'あいことばが ちがいます';
    document.getElementById('lockInput').value = '';
    setTimeout(function(){ errorEl.textContent = ''; }, 2500);
  }
}

var firebaseConfig = {
  apiKey: "AIzaSyC-ujNsGgvWfv2L8XONYFRYAo6tpku1BH0",
  authDomain: "condition-kazutan-manager.firebaseapp.com",
  databaseURL: "https://condition-kazutan-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "condition-kazutan-manager",
  storageBucket: "condition-kazutan-manager.firebasestorage.app",
  messagingSenderId: "843970162374",
  appId: "1:843970162374:web:fe2d6b9bf3efc87aeef1c7"
};

var app = firebase.initializeApp(firebaseConfig);
var db = firebase.database();
console.log('Firebase initialized OK');

var records = [];
var members = [];
var selectedMemberId = null;
var selectedCond = null;
var selectedAppetite = null;
var selectedSymptoms = [];
var selectedMeal = null;
var historyFilterId = 'all';
var emojiTarget = null;

var EMOJIS = ['🐱','🐶','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐸','🌸','🌻','🍀','🌈','⭐','🌙','☀️','❄️','🎀','💎','🍎','🍓','🍋','🍇','🎵','🎨','🏄','🌊','🗻','🌟'];
var COND_LABEL = { genki:'☀️ 元気', futsuu:'🌤 まあまあ', warui:'🌧 わるい', tsurai:'⛈ つらい' };
var AP_LABEL = { choo:'🍜 超いい（ラーメン求）', futsuu:'🍙 ふつう', biwaru:'😶 びわる', kyokuwaru:'🛌 きょくわる' };
var AP_CLASS = { choo:'ap-choo', futsuu:'ap-futsuu', biwaru:'ap-biwaru', kyokuwaru:'ap-kyokuwaru' };
var AP_NAME_MAP = { choo:'超いい🍜', futsuu:'ふつう🍙', biwaru:'びわる😶', kyokuwaru:'きょくわる🛌' };

// ========== Firebase 接続テスト ==========
// connected ステータスを直接監視
db.ref('.info/connected').on('value', function(snap) {
  if (snap.val() === true) {
    setSyncStatus('ok', '同期中');
    document.getElementById('settingsSyncText').textContent = '同期中 ✓';
    console.log('Firebase: connected');
  } else {
    setSyncStatus('loading', '接続中...');
    console.log('Firebase: disconnected');
  }
});

// メンバー監視
db.ref('members').on('value', function(snap) {
  console.log('members snapshot received', snap.val());
  members = [];
  snap.forEach(function(c) {
    members.push({ fbKey: c.key, name: c.val().name, emoji: c.val().emoji });
  });
  renderMemberSelect();
  renderMemberListManage();
  renderHistoryFilter();
}, function(err) {
  console.error('members error:', err);
  setSyncStatus('err', 'エラー: ' + err.message);
});

// 記録監視
db.ref('records').on('value', function(snap) {
  console.log('records snapshot received', snap.numChildren(), 'records');
  records = [];
  snap.forEach(function(c) {
    var v = c.val();
    v.fbKey = c.key;
    records.push(v);
  });
  var activeTab = document.querySelector('.tab.active').dataset.tab;
  if (activeTab === 'history') renderHistory();
  if (activeTab === 'analysis') renderAnalysis();
}, function(err) {
  console.error('records error:', err);
  setSyncStatus('err', 'エラー: ' + err.message);
});

function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

function addMember() {
  var el = document.getElementById('newMemberName');
  var name = el.value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  for (var i=0; i<members.length; i++) {
    if (members[i].name === name) { showToast('同じ名前がすでにいます'); return; }
  }
  var emoji = EMOJIS[Math.floor(Math.random() * 10)];
  db.ref('members').push({ name: name, emoji: emoji });
  el.value = '';
  showToast(name + ' を追加しました 🌿');
}

function deleteMember(fbKey, name) {
  if (!confirm('「' + name + '」を削除しますか？\n（記録は残ります）')) return;
  db.ref('members/' + fbKey).remove();
  if (selectedMemberId === fbKey) selectedMemberId = null;
}

function openEmojiPicker(fbKey) {
  emojiTarget = fbKey;
  var html = '';
  for (var i=0; i<EMOJIS.length; i++) {
    html += '<button class="emoji-opt" onclick="pickEmoji(\'' + EMOJIS[i] + '\')">' + EMOJIS[i] + '</button>';
  }
  document.getElementById('emojiGrid').innerHTML = html;
  document.getElementById('emojiOverlay').style.display = 'flex';
}

function pickEmoji(emoji) {
  if (!emojiTarget) return;
  db.ref('members/' + emojiTarget + '/emoji').set(emoji);
  document.getElementById('emojiOverlay').style.display = 'none';
  emojiTarget = null;
}

document.getElementById('emojiOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

function renderMemberListManage() {
  var el = document.getElementById('memberListManage');
  if (members.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:var(--ink-soft);padding:4px 0">まだメンバーがいません。下から追加してね</div>';
    return;
  }
  var html = '';
  for (var i=0; i<members.length; i++) {
    var m = members[i];
    html += '<div class="member-row-manage">' +
      '<button class="member-emoji-btn" onclick="openEmojiPicker(\'' + m.fbKey + '\')">' + (m.emoji||'👤') + '</button>' +
      '<span class="member-name-text">' + esc(m.name) + '</span>' +
      '<button class="member-del-btn" onclick="deleteMember(\'' + m.fbKey + '\',\'' + esc(m.name) + '\')">✕</button>' +
      '</div>';
  }
  el.innerHTML = html;
}

function renderMemberSelect() {
  var el = document.getElementById('memberSelect');
  if (members.length === 0) {
    el.innerHTML = '<div style="font-size:13px;color:var(--ink-soft)">「かんり」タブでメンバーを追加してください</div>';
    return;
  }
  var html = '';
  for (var i=0; i<members.length; i++) {
    var m = members[i];
    var cls = selectedMemberId === m.fbKey ? 'member-btn active' : 'member-btn';
    html += '<button class="' + cls + '" onclick="selectMember(\'' + m.fbKey + '\')">' + (m.emoji||'👤') + ' ' + esc(m.name) + '</button>';
  }
  el.innerHTML = html;
}

function selectMember(id) {
  selectedMemberId = id;
  renderMemberSelect();
}

function selectCond(btn) {
  var all = document.querySelectorAll('.cond-btn');
  for (var i=0;i<all.length;i++) all[i].classList.remove('active');
  btn.classList.add('active');
  selectedCond = btn.dataset.cond;
}

function selectAppetite(btn) {
  var all = document.querySelectorAll('.appetite-btn');
  for (var i=0;i<all.length;i++) all[i].className = 'appetite-btn';
  btn.classList.add('active-' + btn.dataset.ap);
  selectedAppetite = btn.dataset.ap;
}

function toggleChip(btn) {
  btn.classList.toggle('active');
  var val = btn.dataset.val;
  if (btn.classList.contains('active')) {
    selectedSymptoms.push(val);
  } else {
    selectedSymptoms = selectedSymptoms.filter(function(s){return s!==val;});
  }
}

function selectSingle(btn) {
  var all = document.querySelectorAll('#mealGroup .chip');
  for (var i=0;i<all.length;i++) all[i].classList.remove('active');
  btn.classList.add('active');
  selectedMeal = btn.dataset.val;
}

function saveRecord() {
  if (!selectedMemberId) { showToast('記録する人を選んでください'); return; }
  var member = null;
  for (var i=0;i<members.length;i++) { if(members[i].fbKey===selectedMemberId) member=members[i]; }
  var record = {
    timestamp: new Date().toISOString(),
    memberId: selectedMemberId,
    memberName: member ? member.name : '？',
    memberEmoji: member ? (member.emoji||'👤') : '👤',
    cond: selectedCond,
    appetite: selectedAppetite,
    symptoms: selectedSymptoms.slice(),
    meal: selectedMeal,
    note: document.getElementById('noteInput').value.trim()
  };
  db.ref('records').push(record).then(function() {
    showToast('記録したよ 🌿');
    resetForm();
  }).catch(function(e) {
    showToast('保存エラー: ' + e.message);
  });
}

function deleteRecord(fbKey) {
  if (!confirm('この記録を削除しますか？')) return;
  db.ref('records/' + fbKey).remove();
}

function resetForm() {
  selectedCond = null; selectedAppetite = null; selectedSymptoms = []; selectedMeal = null;
  var btns = document.querySelectorAll('.cond-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  var chips = document.querySelectorAll('.chip');
  for(var i=0;i<chips.length;i++) chips[i].classList.remove('active');
  var aps = document.querySelectorAll('.appetite-btn');
  for(var i=0;i<aps.length;i++) aps[i].className='appetite-btn';
  document.getElementById('noteInput').value = '';
}

function renderHistoryFilter() {
  var el = document.getElementById('historyFilter');
  var html = '<button class="sub-tab ' + (historyFilterId==='all'?'active':'') + '" onclick="setHistoryFilter(\'all\',this)">すべて</button>';
  for (var i=0;i<members.length;i++) {
    var m = members[i];
    var cls = historyFilterId===m.fbKey ? 'sub-tab active' : 'sub-tab';
    html += '<button class="'+cls+'" onclick="setHistoryFilter(\''+m.fbKey+'\',this)">'+(m.emoji||'👤')+' '+esc(m.name)+'</button>';
  }
  el.innerHTML = html;
}

function setHistoryFilter(id, btn) {
  historyFilterId = id;
  var all = document.querySelectorAll('#historyFilter .sub-tab');
  for(var i=0;i<all.length;i++) all[i].classList.remove('active');
  btn.classList.add('active');
  renderHistory();
}

function renderHistory() {
  var list = document.getElementById('recordList');
  var data = records.slice().sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
  if (historyFilterId !== 'all') data = data.filter(function(r){return r.memberId===historyFilterId;});
  if (data.length === 0) { list.innerHTML = '<div class="empty">まだ記録がありません</div>'; return; }
  var html = '';
  for (var i=0; i<data.length; i++) {
    var r = data[i];
    var tags = (r.symptoms||[]).slice();
    if (r.meal) tags.push(r.meal);
    html += '<div class="record-item"><div class="record-head">' +
      '<span class="record-time">' + formatTime(r.timestamp) + '</span>' +
      '<span style="display:flex;align-items:center;gap:4px">' +
      '<span class="record-who">' + esc((r.memberEmoji||'👤')+' '+(r.memberName||'？')) + '</span>' +
      '<button class="delete-btn" onclick="deleteRecord(\''+r.fbKey+'\')">🗑</button>' +
      '</span></div>';
    if (r.cond) html += '<div class="record-cond">' + (COND_LABEL[r.cond]||r.cond) + '</div>';
    if (r.appetite) html += '<div><span class="record-appetite '+(AP_CLASS[r.appetite]||'')+'">'+(AP_LABEL[r.appetite]||r.appetite)+'</span></div>';
    if (tags.length) {
      html += '<div class="record-tags">';
      for(var j=0;j<tags.length;j++) html+='<span class="record-tag">'+esc(tags[j])+'</span>';
      html += '</div>';
    }
    if (r.note) html += '<div class="record-note">' + esc(r.note) + '</div>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function renderAnalysis() {
  var content = document.getElementById('analysisContent');
  if (records.length < 3) {
    content.innerHTML = '<div class="card"><div class="empty">記録が3件以上たまると<br>傾向が見えてきます<br><br><span style="color:var(--accent)">いまの記録: '+records.length+'件</span></div></div>';
    return;
  }
  var slots = { '朝':0, '昼':0, '夕方':0, '夜':0, '深夜':0 };
  for (var i=0;i<records.length;i++) {
    var h = new Date(records[i].timestamp).getHours();
    if(h>=5&&h<=10) slots['朝']++; else if(h>=11&&h<=14) slots['昼']++;
    else if(h>=15&&h<=18) slots['夕方']++; else if(h>=19&&h<=22) slots['夜']++;
    else slots['深夜']++;
  }
  var maxSlotKey='朝', maxSlotVal=0;
  for(var k in slots){if(slots[k]>maxSlotVal){maxSlotVal=slots[k];maxSlotKey=k;}}
  var maxBar = Math.max(maxSlotVal, 1);
  var apCount = { choo:0, futsuu:0, biwaru:0, kyokuwaru:0 };
  for(var i=0;i<records.length;i++){if(records[i].appetite)apCount[records[i].appetite]++;}
  var topApKey='choo',topApVal=0;
  for(var k in apCount){if(apCount[k]>topApVal){topApVal=apCount[k];topApKey=k;}}
  var symCount = {};
  for(var i=0;i<records.length;i++){var ss=records[i].symptoms||[];for(var j=0;j<ss.length;j++){symCount[ss[j]]=(symCount[ss[j]]||0)+1;}}
  var topSymArr = [];
  for(var k in symCount) topSymArr.push([k,symCount[k]]);
  topSymArr.sort(function(a,b){return b[1]-a[1];});
  topSymArr = topSymArr.slice(0,3);
  var barHtml = '';
  var slotKeys = ['朝','昼','夕方','夜','深夜'];
  for(var i=0;i<slotKeys.length;i++){
    var sk=slotKeys[i], sv=slots[sk];
    barHtml += '<div class="bar-col"><div class="bar" style="height:'+(sv/maxBar*68)+'px"></div>' +
      '<div class="bar-label">'+sk+'</div><div class="bar-label" style="font-weight:600;color:var(--ink)">'+sv+'</div></div>';
  }
  var memberStatsHtml = '';
  for(var i=0;i<members.length;i++){
    var m=members[i], cnt=0;
    for(var j=0;j<records.length;j++){if(records[j].memberId===m.fbKey)cnt++;}
    if(cnt>0) memberStatsHtml += '<div class="stat-row"><span class="stat-label">'+(m.emoji||'👤')+' '+esc(m.name)+'</span><span class="stat-value">'+cnt+'件</span></div>';
  }
  content.innerHTML =
    '<div class="insight"><div class="insight-title">🌿 見えてきたこと</div><div>' +
    records.length + '件の記録より、<b>' + maxSlotKey + '</b>によく記録している。' +
    (topApVal>0 ? '食欲は<b>'+AP_NAME_MAP[topApKey]+'</b>が多いみたい。' : '') +
    (topSymArr.length ? 'よく出る症状は<b>'+topSymArr.map(function(s){return s[0];}).join('、')+'</b>。' : '') +
    '</div></div>' +
    '<div class="card"><div class="section-title">時間帯グラフ</div><div class="bar-chart">'+barHtml+'</div></div>' +
    (memberStatsHtml ? '<div class="card"><div class="section-title">メンバー別記録数</div>'+memberStatsHtml+'</div>' : '') +
    '<div class="card"><div class="section-title">傾向まとめ</div>' +
    '<div class="stat-row"><span class="stat-label">多い時間帯</span><span class="stat-value">'+maxSlotKey+'</span></div>' +
    (topApVal>0 ? '<div class="stat-row"><span class="stat-label">よくある食欲</span><span class="stat-value">'+AP_NAME_MAP[topApKey]+'</span></div>' : '') +
    (topSymArr.length ? '<div class="stat-row"><span class="stat-label">多い症状</span><span class="stat-value">'+topSymArr[0][0]+'</span></div>' : '') +
    '<div class="stat-row"><span class="stat-label">合計記録数</span><span class="stat-value">'+records.length+'件</span></div>' +
    '</div>';
}

function showTab(target) {
  var tabs = document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active', tabs[i].dataset.tab===target);
  var ids = ['record','history','analysis','settings'];
  for(var i=0;i<ids.length;i++) document.getElementById('tab-'+ids[i]).classList.toggle('hidden', ids[i]!==target);
  if (target==='history') { renderHistoryFilter(); renderHistory(); }
  if (target==='analysis') renderAnalysis();
  if (target==='settings') renderMemberListManage();
}

var tabs = document.querySelectorAll('.tab');
for(var i=0;i<tabs.length;i++){
  tabs[i].addEventListener('click', function(){ showTab(this.dataset.tab); });
}

function formatTime(iso) {
  var d = new Date(iso);
  var dayNames = ['日','月','火','水','木','金','土'];
  return (d.getMonth()+1) + '月' + d.getDate() + '日(' + dayNames[d.getDay()] + ') ' +
    ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
}

function esc(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
